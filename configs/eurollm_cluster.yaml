# Max-power B200 run — warm-start from Thunder step1000 weights, fill the GPU.
#   python src/diffusion/train.py configs/eurollm_cluster.yaml   (single B200)
model:
  name: amar3012005/project-berlin-eurollm-de   # WARM-START: trained step1000 weights (HF, private)
  block_size: 64
  attn_implementation: sdpa
  trust_remote_code: false
  compile: true                            # packing => static shapes => compile safe
  compile_mode: default                    # reliable fast warmup (max-autotune risky on B200)

data:
  hf_dataset: null
  hf_config: null
  jsonl_paths:
    - data/openlegaldata_de.jsonl
    - data/wikipedia_de.jsonl
  corpus_weights: [1.5, 1.0]
  text_field: text
  max_length: 1024               # longer context (B200 has VRAM to spare)
  pack: true                     # packing => GPU never data-starves
  streaming: false

train:
  output_dir: checkpoints/eurollm_cluster
  epochs: 50
  max_steps: 3000
  per_device_batch_size: 48      # fill the 183GB B200 (was 8 => 16% VRAM)
  grad_accum: 2                  # global batch = 48 * 2 = 96 seqs * 1024 = ~98k tokens/step
  num_workers: 8                 # 24 vCPU => feed the GPU
  lr: 2.0e-5
  warmup_steps: 100
  min_lr_ratio: 0.1
  weight_decay: 0.01
  t_min: 0.05
  mask_schedule: beta
  mask_block_size: 64
  loss_weight_alpha: 0.3
  grad_clip: 1.0
  nan_loss_threshold: 10000
  grad_checkpointing: false
  resume_from: null
  precision: bf16
  log_every: 10
  save_every: 100
  seed: 0
  wandb: false
  wandb_project: project-berlin
