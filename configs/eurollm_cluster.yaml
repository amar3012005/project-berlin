# Fast real run â€” EuroLLM-1.7B on 4x A100 80GB FSDP + flash-attn.
# Accuracyâ†‘ (cosine LR, big batch) + timeâ†“ (4 GPU, FA2, num_workers).
#   ./start.sh train_multi configs/eurollm_cluster.yaml
model:
  name: utter-project/EuroLLM-1.7B
  block_size: 64
  attn_implementation: sdpa                # sdpa (no flash-attn build needed); FA2 later
  trust_remote_code: false
  compile: true                            # packing => static shapes => compile safe (+15-30%)

data:
  hf_dataset: null
  hf_config: null
  jsonl_paths:
    - data/openlegaldata_de.jsonl
    - data/wikipedia_de.jsonl
  corpus_weights: [1.5, 1.0]     # register balance: upweight legal (fewer docs)
  text_field: text
  max_length: 512
  pack: true                     # sequence packing â€” no PAD waste, static shapes
  streaming: false

train:
  output_dir: checkpoints/eurollm_cluster
  epochs: 5
  max_steps: 3000
  per_device_batch_size: 8       # 80GB A100 fits more
  grad_accum: 4                  # global batch = 8 * 4 * 4gpu = 128
  num_workers: 4                 # overlap tokenization with compute
  lr: 2.0e-5
  warmup_steps: 150
  min_lr_ratio: 0.1              # cosine decay floor
  weight_decay: 0.01
  t_min: 0.05                    # clamp low-t (tames 1/t loss variance)
  mask_schedule: beta            # non-uniform, skewed-low (Dream-7B/CART)
  mask_block_size: 64            # block-aligned masking (matches attention blocks)
  loss_weight_alpha: 0.3         # smoothed weight w(t)=alpha+(1-alpha)/t
  grad_clip: 1.0
  precision: bf16
  log_every: 10
  save_every: 100                # granular checkpoints (every 100 steps)
  seed: 0
  wandb: false
  wandb_project: project-berlin
