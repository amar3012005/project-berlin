# Production config — Pharia-1-7B AR -> discrete-diffusion surgery on ThunderCompute.
# Run on 8x A100/H100:
#   accelerate launch --config_file configs/accelerate_fsdp.yaml \
#       src/diffusion/train.py configs/pharia_7b.yaml
# NOTE: Pharia-1 is gated on HF — `huggingface-cli login` on the instance first.
model:
  name: Aleph-Alpha/Pharia-1-LLM-7B-control   # llama-arch; same surgery, zero code change
  block_size: 64
  attn_implementation: sdpa      # or flash_attention_2 if flash-attn installed (Hopper=FA3)
  trust_remote_code: true        # Pharia may ship custom code

data:
  hf_dataset: null
  hf_config: null
  jsonl_paths:                   # Stage-2 corpora
    - data/openlegaldata_de.jsonl    # German legal rulings
    - data/din_vde_scrapes.jsonl     # DIN/VDE engineering standards
  text_field: text
  max_length: 1024
  streaming: true                # stream large corpora, don't load to RAM

train:
  output_dir: checkpoints/pharia_7b
  epochs: 100                    # data-constrained: diffusion tolerates 50-100 epochs (CMU 2025)
  max_steps: null
  per_device_batch_size: 1       # 7B @ 1024 ctx; raise if VRAM allows
  grad_accum: 16                 # global batch = 1 * 16 * 8gpu = 128
  lr: 1.0e-5
  warmup_steps: 500
  weight_decay: 0.01
  t_min: 1.0e-3
  mask_schedule: uniform
  grad_clip: 1.0
  precision: bf16
  log_every: 10
  save_every: 500
  seed: 0
  wandb: true
  wandb_project: project-berlin
