# Smoke test — EuroLLM-1.7B on the 8-line sample corpus. Proves load + surgery +
# train step + checkpoint on REAL llama-arch GPU before any big run. Minutes, cents.
#   ./start.sh train configs/eurollm_smoke.yaml
model:
  name: utter-project/EuroLLM-1.7B   # ungated, no HF login needed
  block_size: 64
  attn_implementation: sdpa          # FA2 path on Ampere (A6000)
  trust_remote_code: false
  compile: true                      # torch.compile — free 10-30% (Triton backend)

data:
  hf_dataset: null
  hf_config: null
  jsonl_paths:
    - data/sample_de.jsonl           # in-repo, exists
  text_field: text
  max_length: 256
  streaming: false

train:
  output_dir: checkpoints/eurollm_smoke
  epochs: 20
  max_steps: 40
  per_device_batch_size: 2
  grad_accum: 1
  lr: 1.0e-5
  warmup_steps: 5
  weight_decay: 0.01
  t_min: 1.0e-3
  mask_schedule: uniform
  grad_clip: 1.0
  precision: bf16
  log_every: 5
  save_every: 40
  seed: 0
  wandb: false
  wandb_project: project-berlin
