# Toy config — proves the full pipeline locally (CPU/MPS) or on a cheap A6000.
# Run: ./start.sh train configs/toy_gpt2.yaml
model:
  name: dbmdz/german-gpt2        # 124M GPT2-arch German model
  block_size: 64                 # bidirectional attention block
  attn_implementation: eager     # eager works everywhere; sdpa on GPU
  trust_remote_code: false

data:
  # either a HuggingFace dataset id OR local jsonl files (field: "text")
  hf_dataset: null               # e.g. "oscar-corpus/OSCAR-2301" (needs auth/streaming)
  hf_config: null
  jsonl_paths:                   # used when hf_dataset is null
    - data/sample_de.jsonl
  text_field: text
  max_length: 256
  streaming: false

train:
  output_dir: checkpoints/toy_gpt2
  epochs: 30
  max_steps: 30
  per_device_batch_size: 2
  grad_accum: 1
  lr: 5.0e-5
  warmup_steps: 5
  weight_decay: 0.01
  t_min: 1.0e-3                  # min masking prob (LLaDA NELBO stability)
  mask_schedule: uniform         # t ~ U[t_min, 1]
  grad_clip: 1.0
  precision: bf16                # bf16 on GPU; auto-falls back to fp32 on CPU/MPS
  log_every: 10
  save_every: 15
  seed: 0
  wandb: false                   # set true + WANDB_API_KEY to log
  wandb_project: project-berlin
