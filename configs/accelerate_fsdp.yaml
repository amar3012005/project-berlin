# 8-GPU FSDP launch config for ThunderCompute single node (A100/H100 80GB).
# Used by: accelerate launch --config_file configs/accelerate_fsdp.yaml src/diffusion/train.py <cfg>
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
mixed_precision: bf16
num_machines: 1
num_processes: 8                 # = number of GPUs in the node
rdzv_backend: static
same_network: true
fsdp_config:
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_offload_params: false
  fsdp_use_orig_params: true
  fsdp_cpu_ram_efficient_loading: true
  fsdp_sync_module_states: true
downcast_bf16: true
